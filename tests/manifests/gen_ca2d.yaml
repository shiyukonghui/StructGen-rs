global:
  output_dir: "tests/output/gen_ca2d"
  default_format: "Text"
tasks:
  - name: "conway_life"
    generator: "ca2d"
    params:
      seq_length: 50
      extensions:
        rule_type: "lifelike"
        birth: [3]
        survival: [2, 3]
