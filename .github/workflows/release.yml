name: Release

# 触发条件：推送版本标签（如 v0.1.0、v1.0.0）
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always
  # 从 tag 中提取版本号（去掉前缀 v）
  APP_NAME: structgen-rs

jobs:
  # 多平台 Release 构建
  build:
    name: 构建 (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
            asset_name: structgen-rs-linux-x86_64.tar.gz

          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
            asset_name: structgen-rs-macos-x86_64.tar.gz

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-aarch64
            asset_name: structgen-rs-macos-aarch64.tar.gz

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
            asset_name: structgen-rs-windows-x86_64.zip

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 稳定版工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: 构建 Release 二进制
        run: cargo build --release --target ${{ matrix.target }}

      - name: 打包产物（Linux / macOS）
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ matrix.asset_name }} ${{ env.APP_NAME }}
          mv ${{ matrix.asset_name }} ${{ github.workspace }}/${{ matrix.asset_name }}
        shell: bash

      - name: 打包产物（Windows）
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a -tzip ${{ matrix.asset_name }} ${{ env.APP_NAME }}.exe
          mv ${{ matrix.asset_name }} ${{ github.workspace }}/${{ matrix.asset_name }}
        shell: bash

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_suffix }}
          path: ${{ matrix.asset_name }}
          retention-days: 7

  # 创建 GitHub Release 并上传所有产物
  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4

      - name: 整理产物文件
        run: |
          mkdir -p dist
          for dir in */; do
            cp "$dir"/* dist/ 2>/dev/null || true
          done
          ls -la dist/
        shell: bash

      - name: 生成 Release 变更日志
        id: changelog
        run: |
          TAG_NAME="${{ github.ref_name }}"
          echo "## 发布说明" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "**版本**: ${TAG_NAME}" >> CHANGELOG.md
          echo "**提交**: ${{ github.sha }}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### 下载" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          for file in dist/*; do
            echo "- $(basename "$file")" >> CHANGELOG.md
          done
          cat CHANGELOG.md

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          generate_release_notes: true
