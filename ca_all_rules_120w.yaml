# ============================================================
# StructGen-rs 批量数据生成清单
# 19 种元胞自动机规则，每种 1,200,000 条样本
# 输出格式: Npy（NumPy 兼容，便于模型训练直接加载）
# ============================================================

global:
  output_dir: "F:/RustProjects/StructGen-rs/output_ca_120w"
  default_format: "Npy"
  num_threads: 8
  stream_write: true
  shard_max_sequences: 10000

