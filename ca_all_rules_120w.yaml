  - name: "ca1d_rule30"
    generator: "ca"
    params:
      seq_length: 128
      extensions:
        rule: 30
        width: 128
        boundary: "periodic"
    count: 1200000
    seed: 1001
    pipeline: []
    output_format: "Npy"

